<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraWeb | Proyecto Unity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* Fondo con efecto de estrellas suave */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            z-index: -1;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .glow-effect {
            position: absolute;
            width: 300px;
            height: 300px;
            background: #3b82f6;
            filter: blur(120px);
            opacity: 0.15;
            z-index: -1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Estilo para que el iframe se sienta integrado */
        .iframe-wrapper {
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="stars"></div>
    <div class="glow-effect"></div>

    <div class="main-card max-w-[700px] w-full mx-4">
        <header class="mb-8">
            <h1 class="text-4xl font-bold tracking-tight mb-2">
                Terra<span class="text-blue-500">Web</span>
            </h1>
            <p class="text-gray-400 font-light italic">Proyecto de Simulación del Planeta Tierra</p>
        </header>

        <div class="iframe-wrapper mb-8">
            <iframe 
                frameborder="0" 
                src="https://itch.io/embed/4541364" 
                width="552" 
                height="167">
                <a href="https://istec-for340.itch.io/terraweb">TerraWeb by ISTEC-FOR340</a>
            </iframe>
        </div>

        <section class="space-y-4">
            <p class="text-sm text-gray-300 leading-relaxed">
                Bienvenido a la simulación interactiva. El widget de arriba permite acceder 
                directamente a la versión de <strong>Unity</strong> sin salir de esta página.
            </p>
            
            <div class="flex justify-center gap-6 pt-4">
                <div class="text-center">
                    <span class="block text-blue-400 font-bold text-xl">1.0</span>
                    <span class="text-[10px] uppercase text-gray-500 tracking-widest">Versión</span>
                </div>
                <div class="border-l border-white/10 h-10"></div>
                <div class="text-center">
                    <span class="block text-blue-400 font-bold text-xl">3D</span>
                    <span class="text-[10px] uppercase text-gray-500 tracking-widest">Motor</span>
                </div>
                <div class="border-l border-white/10 h-10"></div>
                <div class="text-center">
                    <span class="block text-blue-400 font-bold text-xl">Web</span>
                    <span class="text-[10px] uppercase text-gray-500 tracking-widest">Plataforma</span>
                </div>
            </div>
        </section>
    </div>

    <footer class="mt-8 text-gray-600 text-[11px] uppercase tracking-[3px]">
        Desarrollado por ISTEC-FOR340 • 2026
    </footer>

</body>
</html>
